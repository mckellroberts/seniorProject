<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="frontend/style.css" />
  </head>

  <body>

    <header class="page-header">
      <p>Upload your work · train on your words · generate in your style</p>
    </header>

    <div class="layout">

      <!-- ── LEFT: Upload ── -->
      <div class="card">
        <div class="card-title">📂 Your Writing Samples</div>
        <p class="card-subtitle">Supported: .txt · .pdf · .md · .docx</p>

        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" multiple accept=".txt,.pdf,.md,.docx" />
          <div class="drop-icon">⬆️</div>
          <p><span>Click to browse</span> or drag files here</p>
          <p class="drop-hint">The more you upload, the better the voice match</p>
        </div>

        <div class="file-list" id="fileList"></div>

        <div class="progress-wrap" id="uploadProgress">
          <div class="progress-bar" id="uploadBar"></div>
        </div>

        <button class="btn btn-primary" id="uploadBtn" disabled>Upload Files</button>
        <div class="status" id="uploadStatus"></div>
      </div>

      <!-- ── RIGHT: Generate ── -->
      <div class="card">
        <div class="card-title">✍️ Generate</div>
        <p class="card-subtitle">Describe what you want written</p>

        <textarea class="prompt-area" id="promptInput"
          placeholder="e.g. Write the opening paragraph of a short story about a lighthouse keeper who hasn't spoken to anyone in three years..."></textarea>

        <div class="hint-row">
          <label>style hint →</label>
          <input class="hint-input" id="styleHint" type="text" placeholder="e.g. more melancholy, shorter sentences" />
        </div>

        <div class="progress-wrap" id="generateProgress">
          <div class="progress-bar" id="generateBar"></div>
        </div>

        <button class="btn btn-primary" id="generateBtn">Generate</button>

        <!-- Output -->
        <div id="outputWrap" style="display:none; margin-top:1.25rem;">
          <div class="output-header">
            <span class="style-tag" id="styleTag">style profile ready</span>
            <button class="copy-btn" id="copyBtn">copy</button>
          </div>
          <div class="output-box has-content" id="outputBox"></div>
          <div class="sources-list" id="sourcesList"></div>
        </div>

        <div class="status" id="generateStatus"></div>
      </div>

    </div>

    <script>
      const USER_ID = "default";
      let selectedFiles = [];

      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const fileList = document.getElementById('fileList');
      const uploadBtn = document.getElementById('uploadBtn');
      const uploadStatus = document.getElementById('uploadStatus');
      const uploadProgress = document.getElementById('uploadProgress');
      const uploadBar = document.getElementById('uploadBar');

      const promptInput = document.getElementById('promptInput');
      const styleHintInput = document.getElementById('styleHint');
      const generateBtn = document.getElementById('generateBtn');
      const generateStatus = document.getElementById('generateStatus');
      const generateProgress = document.getElementById('generateProgress');
      const generateBar = document.getElementById('generateBar');
      const outputWrap = document.getElementById('outputWrap');
      const outputBox = document.getElementById('outputBox');
      const styleTag = document.getElementById('styleTag');
      const sourcesList = document.getElementById('sourcesList');
      const copyBtn = document.getElementById('copyBtn');

      // ── Upload ─────────────────────────────────────────────────────────────
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        addFiles([...e.dataTransfer.files]);
      });
      fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

      function addFiles(newFiles) {
        newFiles.forEach(f => {
          if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f);
        });
        renderFileList();
      }

      function renderFileList() {
        fileList.innerHTML = '';
        selectedFiles.forEach((file, i) => {
          const item = document.createElement('div');
          item.className = 'file-item';
          item.innerHTML = `
          <span class="file-icon">${getFileIcon(file.name)}</span>
          <div class="file-info">
            <div class="file-name">${file.name}</div>
            <div class="file-size">${formatSize(file.size)}</div>
          </div>
          <button class="remove-btn" data-index="${i}" title="Remove">&#x2715;</button>
        `;
          fileList.appendChild(item);
        });
        fileList.querySelectorAll('.remove-btn').forEach(btn =>
          btn.addEventListener('click', () => {
            selectedFiles.splice(Number(btn.dataset.index), 1);
            renderFileList();
          })
        );
        uploadBtn.disabled = selectedFiles.length === 0;
        uploadStatus.className = 'status';
      }

      uploadBtn.addEventListener('click', async () => {
        if (!selectedFiles.length) return;
        uploadBtn.disabled = true;
        uploadStatus.className = 'status';
        uploadProgress.style.display = 'block';
        uploadBar.style.width = '0%';

        const results = [];
        for (let i = 0; i < selectedFiles.length; i++) {
          const formData = new FormData();
          formData.append('file', selectedFiles[i]);
          formData.append('user_id', USER_ID);
          try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            results.push({ name: selectedFiles[i].name, ok: res.ok, msg: data.message || data.error });
          } catch {
            results.push({ name: selectedFiles[i].name, ok: false, msg: 'Network error' });
          }
          uploadBar.style.width = `${Math.round(((i + 1) / selectedFiles.length) * 100)}%`;
        }

        const failed = results.filter(r => !r.ok);
        if (!failed.length) {
          showStatus(uploadStatus, 'success', `✓ ${results.length} file(s) uploaded and indexed`);
          selectedFiles = [];
          renderFileList();
        } else {
          showStatus(uploadStatus, 'error', `✗ Failed: ${failed.map(f => f.name).join(', ')}`);
          uploadBtn.disabled = false;
        }
        setTimeout(() => { uploadProgress.style.display = 'none'; uploadBar.style.width = '0%'; }, 1200);
      });

      // ── Generate ───────────────────────────────────────────────────────────
      generateBtn.addEventListener('click', async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) {
          showStatus(generateStatus, 'error', '✗ Please enter a prompt first');
          return;
        }

        generateBtn.disabled = true;
        generateStatus.className = 'status';
        outputWrap.style.display = 'none';
        generateProgress.style.display = 'block';

        let prog = 0;
        const ticker = setInterval(() => {
          prog = Math.min(prog + Math.random() * 8, 85);
          generateBar.style.width = `${prog}%`;
        }, 400);

        try {
          const res = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: prompt,
              userId: USER_ID,
              styleHint: styleHintInput.value.trim(),
            }),
          });
          const data = await res.json();

          if (!res.ok || data.error) {
            showStatus(generateStatus, 'error', `✗ ${data.error || 'Generation failed'}`);
          } else {
            outputBox.textContent = data.generatedText || '';
            styleTag.textContent = data.styleProfile?.summary
              ? `style: ${data.styleProfile.summary.slice(0, 60)}...`
              : 'style profile applied';
            sourcesList.textContent = data.sourcesUsed?.length
              ? `sourced from: ${data.sourcesUsed.join(', ')}`
              : '';
            outputWrap.style.display = 'block';
          }
        } catch {
          showStatus(generateStatus, 'error', '✗ Network error — is the server running?');
        } finally {
          clearInterval(ticker);
          generateBar.style.width = '100%';
          setTimeout(() => { generateProgress.style.display = 'none'; generateBar.style.width = '0%'; }, 500);
          generateBtn.disabled = false;
        }
      });

      promptInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateBtn.click();
      });

      copyBtn.addEventListener('click', async () => {
        await navigator.clipboard.writeText(outputBox.textContent);
        copyBtn.textContent = 'copied!';
        setTimeout(() => { copyBtn.textContent = 'copy'; }, 1500);
      });

      function showStatus(el, type, msg) {
        el.className = `status ${type}`;
        el.textContent = msg;
      }

      function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 ** 2) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 ** 2).toFixed(1)} MB`;
      }

      function getFileIcon(name) {
        const ext = name.split('.').pop().toLowerCase();
        return { pdf: '📄', doc: '📝', docx: '📝', txt: '📃', md: '📃' }[ext] || '📁';
      }
    </script>
  </body>

</html>
