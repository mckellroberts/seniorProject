<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Profile — VoiceForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2a2a2a;
      --accent: #7D1D3F;
      --accent-hover: #9B2449;
      --accent-dim: rgba(125, 29, 63, 0.15);
      --accent-border: rgba(125, 29, 63, 0.4);
      --text: #e8e8e8;
      --soft: #aaaaaa;
      --muted: #888888;
      --error: #c0392b;
      --error-bg: rgba(192, 57, 43, 0.08);
      --sidebar-w: 220px;
      --sidebar-w-sm: 52px;
      --topbar-h: 44px;
      --radius: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans); display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w-sm); height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width 0.22s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
    }
    .sidebar.expanded { width: var(--sidebar-w); }

    .sidebar-header {
      height: var(--topbar-h); display: flex; align-items: center; gap: 0.75rem;
      padding: 0 0.75rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .toggle-btn {
      width: 32px; height: 32px; flex-shrink: 0;
      background: none; border: none; color: var(--soft);
      cursor: pointer; border-radius: var(--radius); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn:hover { background: var(--surface2); color: var(--text); }
    .brand-label {
      font-size: 1rem; font-weight: 700; color: var(--text);
      letter-spacing: -0.5px; white-space: nowrap; opacity: 0;
      pointer-events: none; transition: opacity 0.15s;
    }
    .brand-label span { color: var(--accent); }
    .sidebar.expanded .brand-label { opacity: 1; pointer-events: auto; }

    .sidebar-user {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 1rem 0.75rem; border-bottom: 1px solid var(--border);
      flex-shrink: 0; min-width: 0;
    }
    .user-avatar {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: var(--accent); color: #fff; font-size: 0.8rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center; text-transform: uppercase;
    }
    .user-info { overflow: hidden; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .sidebar.expanded .user-info { opacity: 1; pointer-events: auto; }
    .username {
      font-size: 0.85rem; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-sub { font-size: 0.7rem; color: var(--muted); font-family: var(--font-mono); }

    .sidebar-nav { flex: 1; padding: 0.5rem 0; overflow-y: auto; overflow-x: hidden; }
    .nav-item {
      width: 100%; display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.75rem; background: none; border: none;
      color: var(--soft); font-family: var(--font-sans); font-size: 0.85rem;
      cursor: pointer; text-align: left; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { color: var(--text); background: var(--accent-dim); }
    .nav-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
    }
    .nav-label { opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .sidebar.expanded .nav-label { opacity: 1; pointer-events: auto; }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 0.5rem 0; flex-shrink: 0; }
    .nav-logout { color: var(--muted); }
    .nav-logout:hover { color: var(--error); background: var(--error-bg); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar {
      height: var(--topbar-h); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-brand { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .topbar-brand span { color: var(--accent); }
    .topbar-mode-pills {
      display: flex; gap: 2px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; padding: 2px;
    }
    .mode-pill {
      background: none; border: none; color: var(--muted);
      font-family: var(--font-sans); font-size: 0.78rem; font-weight: 500;
      padding: 0.3rem 0.65rem; border-radius: 4px; cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .mode-pill:hover { color: var(--soft); }
    .mode-pill.active { background: var(--accent); color: #fff; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 2rem 1.5rem 4rem; }
    .content-inner { max-width: 820px; margin: 0 auto; }

    .page-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.4rem; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }

    /* ── Loading / error ── */
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.75rem;
      padding: 4rem 1rem; color: var(--muted); font-size: 0.9rem;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section cards ── */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .profile-grid .full-width { grid-column: 1 / -1; }

    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .profile-card:hover { border-color: var(--accent-border); }

    .card-heading {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--accent);
    }

    .profile-row { display: flex; flex-direction: column; gap: 0.2rem; }
    .profile-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .profile-value {
      font-size: 0.88rem; color: var(--text); line-height: 1.5;
      border: 1px solid transparent; border-radius: 4px;
      padding: 0.2rem 0.4rem; margin: -0.2rem -0.4rem;
      outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .profile-value[contenteditable="true"]:hover { border-color: var(--border); }
    .profile-value[contenteditable="true"]:focus { border-color: var(--accent-border); background: var(--surface2); }

    /* ── Save bar ── */
    .save-bar {
      position: sticky; bottom: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 1rem;
      margin: 2rem -1.5rem -4rem;
    }
    .save-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); padding: 0.5rem 1.25rem;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--accent-hover); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .reset-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 0.5rem 1rem;
      font-size: 0.88rem; cursor: pointer; transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--error); color: var(--error); }
    .save-status { font-size: 0.82rem; color: var(--muted); }

    /* ── Stat bar ── */
    .stat-row {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .stat-label { font-size: 0.8rem; color: var(--soft); min-width: 90px; }
    .stat-bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .stat-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.6s ease; }
    .stat-val { font-size: 0.78rem; color: var(--muted); font-family: var(--font-mono); min-width: 36px; text-align: right; }

    /* ── Punctuation chips ── */
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.2rem 0.55rem;
      font-size: 0.78rem; color: var(--soft);
      font-family: var(--font-mono);
    }
    .chip span { color: var(--text); font-weight: 600; margin-left: 0.3rem; }

    /* ── Character list ── */
    .character-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .character-item {
      background: var(--surface2); border-radius: 6px;
      padding: 0.7rem 0.85rem;
    }
    .character-name { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .character-desc { font-size: 0.82rem; color: var(--soft); line-height: 1.45; }

    @media (max-width: 640px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-grid .full-width { grid-column: 1; }
    }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <span class="brand-label">Voice<span>Forge</span></span>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="username" id="sidebarUsername">Loading...</div>
        <div class="user-sub">writer</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="window.location.href='/'" title="Upload Files">
        <span class="nav-icon">↑</span>
        <span class="nav-label">Upload Files</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/'" title="My Works">
        <span class="nav-icon">≡</span>
        <span class="nav-label">My Works</span>
      </button>
      <button class="nav-item active" onclick="window.location.href='/style-page'" title="Style Profile">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Style Profile</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/ideas-page'" title="Writing Ideas">
        <span class="nav-icon">✦</span>
        <span class="nav-label">Writing Ideas</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="window.location.href='/'" style="color:var(--accent)" title="Demo Mode">
        <span class="nav-icon">⚗</span>
        <span class="nav-label">Demo / Tester</span>
      </button>
      <button class="nav-item nav-logout" onclick="logout()" title="Sign Out">
        <span class="nav-icon">→</span>
        <span class="nav-label">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-brand">Voice<span>Forge</span></span>
        <div class="topbar-mode-pills">
          <button class="mode-pill" onclick="window.location.href='/'">Generate</button>
          <button class="mode-pill" onclick="window.location.href='/ideas-page'">Ideas</button>
          <button class="mode-pill active">Analyze</button>
        </div>
      </div>
    </header>

    <div class="content">
      <div class="content-inner">
        <h1 class="page-title">Style Profile</h1>
        <p class="page-sub">A breakdown of your writing voice. Click any field to edit — saved changes affect all future generation.</p>
        <div id="profileContent">
          <div class="loading-state">
            <div class="spinner"></div>
            <span>Analyzing your writing…</span>
          </div>
        </div>
        <div class="save-bar" id="saveBar" style="display:none">
          <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
          <button class="reset-btn" id="resetBtn" onclick="resetProfile()">Reset to Analyzed</button>
          <span class="save-status" id="saveStatus"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('expanded');
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.replace('/login');
    }

    async function loadUser() {
      try {
        const res = await fetch('/auth/me');
        if (!res.ok) { window.location.replace('/login'); return; }
        const data = await res.json();
        document.getElementById('sidebarUsername').textContent = data.username;
        document.getElementById('userAvatar').textContent = data.username[0].toUpperCase();
      } catch { window.location.replace('/login'); }
    }

    let _baseProfile = {};

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function row(label, value, section, field) {
      if (!value) return '';
      const dataAttr = section && field ? `data-section="${section}" data-field="${field}" contenteditable="true"` : '';
      return `<div class="profile-row">
        <div class="profile-label">${escHtml(label)}</div>
        <div class="profile-value" ${dataAttr}>${escHtml(String(value))}</div>
      </div>`;
    }

    function card(heading, bodyHtml, fullWidth = false) {
      return `<div class="profile-card${fullWidth ? ' full-width' : ''}">
        <div class="card-heading">${escHtml(heading)}</div>
        ${bodyHtml}
      </div>`;
    }

    function renderSentenceCard(sentences, paragraphStats) {
      const sl = paragraphStats?.sentenceLength || {};
      const dist = sl.distribution || {};
      const pl = paragraphStats?.paragraphLength || {};
      let html = '';
      html += row('Rhythm', sentences.rhythm || sentences.raw, 'sentences', 'rhythm');
      html += row('Complexity', sentences.complexity, 'sentences', 'complexity');
      html += row('Fragment Use', sentences.fragmentUse, 'sentences', 'fragmentUse');
      html += row('Structural Patterns', sentences.patterns, 'sentences', 'patterns');
      if (sl.avg) {
        html += `<div class="profile-row">
          <div class="profile-label">Sentence Length</div>
          <div class="profile-value">avg ${sl.avg} words &nbsp;·&nbsp; min ${sl.min} &nbsp;·&nbsp; max ${sl.max}</div>
        </div>`;
      }
      if (dist.short) {
        const shortPct  = parseInt(dist.short)  || 0;
        const mediumPct = parseInt(dist.medium) || 0;
        const longPct   = parseInt(dist.long)   || 0;
        html += `<div class="profile-row">
          <div class="profile-label">Length Distribution</div>
          <div style="display:flex;flex-direction:column;gap:0.35rem;margin-top:0.2rem">
            <div class="stat-row"><span class="stat-label">Short (&lt;10w)</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${shortPct}%"></div></div><span class="stat-val">${shortPct}%</span></div>
            <div class="stat-row"><span class="stat-label">Medium (10–20w)</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${mediumPct}%"></div></div><span class="stat-val">${mediumPct}%</span></div>
            <div class="stat-row"><span class="stat-label">Long (&gt;20w)</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${longPct}%"></div></div><span class="stat-val">${longPct}%</span></div>
          </div>
        </div>`;
      }
      if (pl.avgSentences) {
        html += row('Avg Sentences / Paragraph', pl.avgSentences);
        html += row('Avg Words / Paragraph', pl.avgWords);
      }
      return card('Sentence Style', html);
    }

    function renderVocabCard(vocabulary) {
      let html = '';
      html += row('Register', vocabulary.register, 'vocabulary', 'register');
      html += row('Word Complexity', vocabulary.complexity, 'vocabulary', 'complexity');
      const petWords = vocabulary.petWords ? `${vocabulary.petWords}${vocabulary.diction ? ' — ' + vocabulary.diction : ''}` : vocabulary.diction;
      html += row('Pet Words & Diction', petWords, 'vocabulary', 'petWords');
      html += row('Avoidances', vocabulary.avoidances, 'vocabulary', 'avoidances');
      return card('Vocabulary & Diction', html);
    }

    function renderToneCard(tone) {
      let html = '';
      html += row('Primary Tone', tone.primaryTone, 'tone', 'primaryTone');
      html += row('Tone Range', tone.toneRange, 'tone', 'toneRange');
      html += row('Emotional Depth', tone.emotionalDepth, 'tone', 'emotionalDepth');
      html += row('Atmospheric Words', tone.atmosphericWords, 'tone', 'atmosphericWords');
      html += row('Tone Shifts', tone.toneShifts, 'tone', 'toneShifts');
      return card('Tone & Atmosphere', html);
    }

    function renderPunctuationCard(paragraphStats) {
      const ph = paragraphStats?.punctuationHabits || {};
      const dr = paragraphStats?.dialogueRatio;
      const ss = paragraphStats?.sampleSize || {};
      if (!Object.keys(ph).length && dr === undefined) return '';

      let html = '';
      if (dr !== undefined) {
        html += row('Dialogue Ratio', `${Math.round(dr * 100)}% of sentences contain dialogue`);
      }
      const labels = { emDash: 'Em Dash (—)', ellipsis: 'Ellipsis (…)', semicolon: 'Semicolon (;)', exclamation: 'Exclamation (!)', question: 'Question (?)' };
      const chips = Object.entries(ph)
        .filter(([, v]) => v > 0)
        .map(([k, v]) => `<div class="chip">${escHtml(labels[k] || k)}<span>${v}</span></div>`)
        .join('');
      if (chips) {
        html += `<div class="profile-row">
          <div class="profile-label">Punctuation Habits</div>
          <div class="chip-row" style="margin-top:0.3rem">${chips}</div>
        </div>`;
      }
      if (ss.sentences) {
        html += row('Sample Size', `${ss.sentences} sentences across ${ss.chunks} passages`);
      }
      return card('Writing Patterns', html);
    }

    function renderNarrativeCard(storyPatterns) {
      let html = '';
      html += row('Story Arc', storyPatterns.arcType);
      html += row('Recurring Themes', storyPatterns.themes);
      html += row('Pacing', storyPatterns.pacing);
      html += row('Conflict Style', storyPatterns.conflictStyle);
      html += row('Point of View', storyPatterns.narrativePOV);
      return html ? card('Narrative Patterns', html) : '';
    }

    function renderCharactersCard(characterProfiles) {
      const chars = characterProfiles?.characters || [];
      if (!chars.length) return '';
      const items = chars.map(c => {
        const name = c.name || c;
        const desc = typeof c === 'object' ? (c.description || c.role || '') : '';
        return `<div class="character-item">
          <div class="character-name">${escHtml(name)}</div>
          ${desc ? `<div class="character-desc">${escHtml(desc)}</div>` : ''}
        </div>`;
      }).join('');
      return card('Characters', `<div class="character-list">${items}</div>`, true);
    }

    function renderPlotCard(plotSummary) {
      let html = '';
      html += row('Major Events', plotSummary.majorEvents);
      html += row('Setting', plotSummary.setting);
      html += row('Open Threads', plotSummary.openThreads);
      html += row('Current State', plotSummary.currentState);
      return html ? card('Plot Summary', html, true) : '';
    }

    async function loadProfile() {
      const container = document.getElementById('profileContent');
      try {
        const res = await fetch('/styleProfile');
        if (res.status === 401) { window.location.replace('/login'); return; }
        const data = await res.json();

        if (!res.ok) {
          container.innerHTML = `<div class="loading-state" style="color:var(--error)">${escHtml(data.error || 'Failed to load profile.')}</div>`;
          return;
        }

        const sp   = data.styleProfile      || {};
        const ps   = data.paragraphStats    || {};
        const sp2  = data.storyPatterns     || {};
        const cp   = data.characterProfiles || {};
        const plot = data.plotSummary       || {};

        _baseProfile = sp;

        const sentences  = sp.sentences  || {};
        const vocabulary = sp.vocabulary || {};
        const tone       = sp.tone       || {};

        let html = '<div class="profile-grid">';
        html += renderSentenceCard(sentences, ps);
        html += renderVocabCard(vocabulary);
        html += renderToneCard(tone);
        html += renderPunctuationCard(ps);
        html += renderNarrativeCard(sp2);
        html += renderCharactersCard(cp);
        html += renderPlotCard(plot);
        html += '</div>';

        container.innerHTML = html;
        document.getElementById('saveBar').style.display = 'flex';
        if (data.hasOverride) {
          document.getElementById('saveStatus').textContent = 'Showing your saved edits';
        }
      } catch {
        container.innerHTML = `<div class="loading-state" style="color:var(--error)">Network error — is the server running?</div>`;
      }
    }

    async function saveProfile() {
      const btn = document.getElementById('saveBtn');
      const statusEl = document.getElementById('saveStatus');
      btn.disabled = true;
      statusEl.textContent = 'Saving…';

      const override = { sentences: {}, vocabulary: {}, tone: {} };
      document.querySelectorAll('.profile-value[data-section]').forEach(el => {
        const section = el.dataset.section;
        const field   = el.dataset.field;
        const val     = el.textContent.trim();
        if (section && field && val) override[section][field] = val;
      });

      try {
        const res = await fetch('/styleProfile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ styleProfile: override }),
        });
        if (res.ok) {
          statusEl.style.color = 'var(--success)';
          statusEl.textContent = 'Saved — changes will apply to all future generation';
        } else {
          statusEl.style.color = 'var(--error)';
          statusEl.textContent = 'Save failed';
        }
      } catch {
        statusEl.style.color = 'var(--error)';
        statusEl.textContent = 'Network error';
      } finally {
        btn.disabled = false;
        setTimeout(() => { statusEl.textContent = ''; statusEl.style.color = ''; }, 4000);
      }
    }

    async function resetProfile() {
      const statusEl = document.getElementById('saveStatus');
      try {
        await fetch('/styleProfile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ styleProfile: {} }),
        });
        statusEl.style.color = 'var(--soft)';
        statusEl.textContent = 'Reset to analyzed — reloading…';
        setTimeout(() => loadProfile(), 800);
      } catch {
        statusEl.style.color = 'var(--error)';
        statusEl.textContent = 'Network error';
      }
    }

    loadUser();
    loadProfile();
  </script>
</body>
</html>
